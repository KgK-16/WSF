<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emberfront</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@font-face {
  font-family: 'Airborne';
  src: url('{{ .Site.BaseURL }}fonts/airborne.woff2') format('woff2'),
       url('{{ .Site.BaseURL }}fonts/airborne.ttf') format('truetype');
}

:root {
  --accent: #34336b;
  --accent-bright: #6665c0;
  --accent-dim: #1e1d3f;
  --white: #e8e8e0;
  --gray: #888880;
  --dark: #04040a;
  --darker: #020206;
  --border: rgba(102, 101, 192, 0.25);
  --mono: 'Share Tech Mono', monospace;
  font-size: 133%;
}

body {
  background: var(--dark);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow: hidden;
  height: 100vh;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 100;
  height: 3.2rem;
  display: flex;
  align-items: stretch;
  background: var(--darker);
  border-bottom: 1px solid var(--border);
}

.nav-logo-block {
  display: flex;
  align-items: center;
  padding: 0 1.2rem;
  border-right: 1px solid var(--border);
  min-width: 14rem;
  flex-shrink: 0;
}

.nav-logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: 0.52rem;
  letter-spacing: 0.08rem;
  color: rgba(232,232,224,0.45);
  text-decoration: none;
  text-transform: uppercase;
  line-height: 1.3;
}

.nav-links {
  display: flex;
  align-items: stretch;
  flex: 1;
  justify-content: center;
}

.nav-links a {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 400;
  font-size: 0.62rem;
  letter-spacing: 0.18rem;
  text-transform: uppercase;
  color: rgba(232,232,224,0.75);
  text-decoration: none;
  padding: 0 2.4rem;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
  border-left: 1px solid var(--border);
  margin-left: -1px;
  transition: all 0.2s;
  position: relative;
  min-width: 9rem;
  justify-content: center;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent-bright);
  transform: scaleX(0);
  transition: transform 0.2s;
}

.nav-links a:hover {
  color: var(--white);
  background: rgba(52,51,107,0.15);
}

.nav-links a:hover::after { transform: scaleX(1); }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 31rem 1fr;
  height: 100vh;
  padding-top: 3.2rem;
}

/* ── LEFT PANEL ── */
.left-panel {
  background: var(--darker);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.left-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2.1rem,
    rgba(102,101,192,0.04) 2.1rem, rgba(102,101,192,0.04) calc(2.1rem + 1px)
  );
  pointer-events: none;
}

.left-top-bar {
  display: flex;
  align-items: center;
  padding: 0.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(2,2,6,0.8);
}

.left-top-bar-txt {
  font-family: var(--mono);
  font-size: 0.42rem;
  color: var(--accent-bright);
  letter-spacing: 0.12rem;
  opacity: 0.55;
  text-transform: uppercase;
}

.left-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2.4rem 2.6rem;
  position: relative;
}

.hero-tag {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: 0.52rem;
  letter-spacing: 0.28rem;
  text-transform: uppercase;
  color: var(--accent-bright);
  margin-bottom: 1.4rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  opacity: 0.8;
}

.hero-tag::before {
  content: '';
  width: 1.2rem;
  height: 1px;
  background: var(--accent-bright);
}
[4/6/2026 15:07] KgK-16: .hero-title {
  font-family: 'Airborne', 'Rajdhani', sans-serif;
  font-size: clamp(2.2rem, 3.8vw, 3.6rem);
  color: var(--white);
  letter-spacing: 0.2rem;
  text-transform: uppercase;
  line-height: 1.05;
  margin-bottom: 0.5rem;
}

.hero-title-accent { color: var(--accent-bright); }

.hero-year {
  font-family: 'Airborne', 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.1);
  letter-spacing: 0.65rem;
  text-transform: uppercase;
  margin-bottom: 1.6rem;
}

.left-divider {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.4rem;
}

.left-divider-sq {
  width: 0.25rem;
  height: 0.25rem;
  border: 1px solid var(--accent-bright);
  transform: rotate(45deg);
  flex-shrink: 0;
}

.left-divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.hero-desc {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.7rem;
  line-height: 1.9;
  color: rgba(232,232,224,0.4);
  letter-spacing: 0.02rem;
  font-style: italic;
  max-width: 22rem;
}

/* ── RIGHT PANEL ── */
.right-panel {
  position: relative;
  overflow: hidden;
}

.right-bg {
  position: absolute;
  inset: 0;
  background-image: url('{{ .Site.BaseURL }}bg.jpg');
  background-size: cover;
  background-position: center;
  animation: kenburns 24s ease-in-out infinite alternate;
}

@keyframes kenburns {
  0%   { transform: scale(1.04) translate(0,0); }
  100% { transform: scale(1.1) translate(-1.5%,-1%); }
}

.right-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, rgba(2,2,6,0.96) 0%, rgba(2,2,6,0.15) 45%, transparent 100%),
    linear-gradient(to top, rgba(2,2,6,0.55) 0%, transparent 45%);
}

.right-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(102,101,192,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(102,101,192,0.1) 1px, transparent 1px);
  background-size: 3rem 3rem;
}

/* corner marks */
.mark {
  position: absolute;
  width: 1rem;
  height: 1rem;
}
.mark-tr { top: 1rem; right: 1rem; border-top: 1px solid rgba(102,101,192,0.4); border-right: 1px solid rgba(102,101,192,0.4); }
.mark-br { bottom: 5rem; right: 1rem; border-bottom: 1px solid rgba(102,101,192,0.4); border-right: 1px solid rgba(102,101,192,0.4); }

/* ── COORDS STRIP bottom right ── */
.coords-strip {
  position: absolute;
  bottom: 0;
  right: 0;
  left: 0;
  padding: 0.55rem 1.2rem;
  background: rgba(2,2,6,0.75);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(6px);
}

.coords-item {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.coords-label {
  font-family: var(--mono);
  font-size: 0.38rem;
  letter-spacing: 0.15rem;
  color: rgba(102,101,192,0.5);
  text-transform: uppercase;
}

.coords-val {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--accent-bright);
  letter-spacing: 0.08rem;
}

.coords-sep {
  width: 1px;
  height: 1.6rem;
  background: var(--border);
}

/* ── MOBILE ── */
@media (max-width: 900px) {
  :root { font-size: 100%; }
  body { overflow-y: auto; }
  .layout { grid-template-columns: 1fr; height: auto; }
  .right-panel { height: 55vw; }
  nav { height: auto; flex-wrap: wrap; }
  .nav-links { justify-content: flex-start; }
  .nav-links a { min-width: unset; padding: 0 1rem; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo-block">
    <div class="nav-logo">Powered by<br>Redfront Strategic Sciences</div>
  </div>
  <div class="nav-links">
    <a href="{{ .Site.BaseURL }}docs/about/">About Project</a>
    <a href="{{ .Site.BaseURL }}docs/">Archive</a>
    <a href="{{ .Site.BaseURL }}docs/map/">World Map</a>
  </div>
</nav>

<div class="layout">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="left-top-bar">
<span class="left-top-bar-txt">Emberfront · World Archive · Year 420</span>
    </div>
    <div class="left-content">
      <div class="hero-tag">Year 420 · Second Continental War</div>
      <div class="hero-title">Ember<br><span class="hero-title-accent">front</span></div>
      <div class="hero-year">Year 420</div>
      <div class="left-divider">
        <div class="left-divider-sq"></div>
        <div class="left-divider-line"></div>
      </div>
      <p class="hero-desc">Ten years of grinding conflict have consumed every continent. The crew of Spear-75 has decided to end the war themselves.</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="right-bg"></div>
    <div class="right-overlay"></div>
    <div class="right-grid"></div>
    <div class="mark mark-tr"></div>
    <div class="mark mark-br"></div>

      <div class="coords-sep"></div>
      <div class="coords-item">
        <span class="coords-label">Location</span>
        <span class="coords-val">——</span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
