<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emberfront</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: 'Airborne';
  src: url('{{ .Site.BaseURL }}fonts/airborne.woff2') format('woff2'),
       url('{{ .Site.BaseURL }}fonts/airborne.ttf') format('truetype');
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #04040a;
  color: #e8e8e0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAV */
nav {
  height: 48px;
  background: #020206;
  border-bottom: 1px solid rgba(102,101,192,0.25);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  flex-shrink: 0;
}

.nav-brand {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(232,232,224,0.35);
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  gap: 48px;
}

.nav-links a {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,232,224,0.65);
  text-decoration: none;
  transition: color 0.2s;
}

.nav-links a:hover { color: #e8e8e0; }

/* MAIN */
main {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* background photo */
.bg {
  position: absolute;
  inset: 0;
  background-image: url('{{ .Site.BaseURL }}bg.jpg');
  background-size: cover;
  background-position: center;
}

/* dark overlay */
.bg-overlay {
  position: absolute;
  inset: 0;
  background: rgba(4, 4, 10, 0.55);
}

/* center band */
.band {
  position: relative;
  width: 100%;
  background: rgba(2, 2, 6, 0.88);
  border-top: 1px solid rgba(102,101,192,0.3);
  border-bottom: 1px solid rgba(102,101,192,0.3);
  padding: 52px 0;
  text-align: center;
}

.band-eyebrow {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #6665c0;
  margin-bottom: 20px;
}

.band-title {
  font-family: 'Airborne', 'Rajdhani', sans-serif;
  font-size: 52px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #e8e8e0;
  line-height: 1.1;
}

.band-title span { color: #6665c0; }

.band-line {
  width: 48px;
  height: 1px;
  background: rgba(102,101,192,0.4);
  margin: 24px auto;
}

.band-desc {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 1px;
  color: rgba(232,232,224,0.4);
  font-style: italic;
}

</style>
</head>
<body>

<nav>
  <span class="nav-brand">Powered by Redfront Strategic Sciences</span>
  <div class="nav-links">
    <a href="{{ .Site.BaseURL }}docs/about/">About Project</a>
    <a href="{{ .Site.BaseURL }}docs/">Archive</a>
    <a href="{{ .Site.BaseURL }}docs/map/">World Map</a>
  </div>
</nav>

<main>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <div class="band">
    <div class="band-eyebrow">Year 420 · Dieselpunk · Political Fiction</div>
    <div class="band-title">Archive of the<br><span>Second Continental War</span></div>
    <div class="band-line"></div>
    <div class="band-desc">Ten years of grinding conflict. Four fronts. One crew to end it all.</div>
  </div>
</main>

</body>
</html>
